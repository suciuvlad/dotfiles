# Bind 'r' to reload the tmux configuration
unbind r
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# Tmux Plugin Manager (TPM) and Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'catppuccin/tmux'

# Catppuccin theme settings
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"

set -g @catppuccin_window_left_separator ""
set -g @catppuccin_window_right_separator " "
set -g @catppuccin_window_middle_separator " █"
set -g @catppuccin_window_number_position "right"

set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_default_text "#W"

set -g @catppuccin_window_current_fill "number"
set -g @catppuccin_window_current_text "#W"

set -g @catppuccin_status_modules_right "directory session"
set -g @catppuccin_status_left_separator  " "
set -g @catppuccin_status_right_separator ""
set -g @catppuccin_status_fill "icon"
set -g @catppuccin_status_connect_separator "no"

set -g @catppuccin_directory_text "#{pane_current_path}"

# Terminal integration: forward focus events, enable OSC 52 clipboard, allow escape passthrough (images/OSC)
set -g focus-events on
set -g set-clipboard on
set -g allow-passthrough on

# Copy-mode (vi): v to start selection, y to yank and exit
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# Session controls
bind R command-prompt -I "#S" "rename-session -- '%%'"   # rename current session
bind C new-session -c "#{pane_current_path}"             # new session in current path
bind K confirm-before -p "kill session #S? (y/n)" kill-session
bind P switch-client -p                                  # previous session
bind N switch-client -n                                  # next session
bind -n M-Up switch-client -p                            # Alt-Up: previous session (no prefix)
bind -n M-Down switch-client -n                          # Alt-Down: next session (no prefix)


# Position the tmux status bar at the bottom
set-option -g status-position bottom

# Use Vi mode for navigating tmux copy mode
set-window-option -g mode-keys vi

# Set the default terminal to support 256 colors
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:RGB"

# Reduce the escape time delay to 0 milliseconds
set-option -sg escape-time 0

# Enable mouse support
set-option -g mouse on

# Use Ctrl-a instead of the default Ctrl-b for the tmux prefix key
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Increase the scrollback buffer size
set-option -g history-limit 50000

# Split/new-window bindings (all open in current pane's directory)
unbind ^T
bind ^T split-window -h -p 20 -c "#{pane_current_path}"  # Ctrl-t: narrow 20% side pane (drawer)

unbind |
bind | split-window -h -c "#{pane_current_path}"         # | : horizontal split (side by side)
unbind _
bind _ split-window -v -c "#{pane_current_path}"         # _ : vertical split (stacked)

bind c new-window -c "#{pane_current_path}"              # c : new window in current path

# Toggle pane zoom with Ctrl-a
unbind ^A
bind ^A resize-pane -Z

# Cycle through panes with Ctrl-w
unbind ^W
bind ^W select-pane -t :.+

# Resize panes with arrow keys (repeatable: hold/repeat without re-pressing prefix)
unbind Right
bind -r Right resize-pane -R 8
unbind Left
bind -r Left resize-pane -L 8
unbind Up
bind -r Up resize-pane -U 4
unbind Down
bind -r Down resize-pane -D 4

# Set window and pane indexing to start at 1
set -g base-index 1
set-window-option -g pane-base-index 1

# Automatically renumber windows when one is closed
set -g renumber-windows on

# When killing the current session, switch to another instead of detaching
set -g detach-on-destroy off

# Initialize TPM (keep this line at the bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

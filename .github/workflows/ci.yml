name: ci

on:
  push:
    branches: [master]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck
        run: |
          shopt -s globstar nullglob
          shellcheck scripts/setup/*.sh

  brewfile:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Brewfile syntax
        run: brew bundle list --file=scripts/Brewfile >/dev/null
